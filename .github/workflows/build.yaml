permissions: {}

name: CI

on: [push, pull_request]

jobs:
  build:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          check-latest: true
      - run: npm install -g @angular/cli && npm ci && ng build
      - run: ng lint
